<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Successful — Speako</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { color: #1a1a1a; font-size: 22px; margin: 0 0 8px; }
    p { color: #666; font-size: 15px; line-height: 1.5; max-width: 320px; margin: 0 0 24px; }
    .btn {
      background: #007AFF;
      color: #fff;
      padding: 14px 28px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      display: inline-block;
      border: none;
      cursor: pointer;
    }
    .btn-secondary {
      background: transparent;
      color: #007AFF;
      margin-top: 12px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #007AFF;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="icon">🎉</div>
  <h1>Payment Successful</h1>
  <p id="message">Thank you for supporting Speako! Opening the app now...</p>
  <a class="btn" id="openApp" href="speako://payment/success">Open Speako</a>
  <a class="btn btn-secondary" id="storeLink" href="#" style="display:none;">Get the App</a>

  <script>
    (function() {
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      var isAndroid = /Android/.test(navigator.userAgent);
      var storeUrl = isIOS
        ? 'https://apps.apple.com/app/speako'
        : isAndroid
          ? 'https://play.google.com/store/apps/details?id=com.speako.app'
          : null;

      var storeLink = document.getElementById('storeLink');
      if (storeUrl) {
        storeLink.href = storeUrl;
        storeLink.style.display = 'inline-block';
      }

      // Try to open the app immediately
      setTimeout(function() {
        window.location.href = 'speako://payment/success';
      }, 300);

      // If still here after 3 seconds, user probably doesn't have the app
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').textContent =
          "Tap 'Open Speako' to return to the app. If you don't have the app installed, tap 'Get the App'.";
      }, 3000);
    })();
  </script>
</body>
</html>
