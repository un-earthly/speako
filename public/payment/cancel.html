<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Cancelled — Speako</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { color: #1a1a1a; font-size: 22px; margin: 0 0 8px; }
    p { color: #666; font-size: 15px; line-height: 1.5; max-width: 320px; margin: 0 0 24px; }
    .btn {
      background: #8E8E93;
      color: #fff;
      padding: 14px 28px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      display: inline-block;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #8E8E93;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="icon">👋</div>
  <h1>Payment Cancelled</h1>
  <p>No worries — you can upgrade anytime from the app.</p>
  <a class="btn" href="speako://payment/cancel">Back to Speako</a>

  <script>
    setTimeout(function() {
      window.location.href = 'speako://payment/cancel';
    }, 500);
    setTimeout(function() {
      document.querySelector('.spinner').style.display = 'none';
    }, 2000);
  </script>
</body>
</html>
