<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Failed — Speako</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { color: #1a1a1a; font-size: 22px; margin: 0 0 8px; }
    p { color: #666; font-size: 15px; line-height: 1.5; max-width: 320px; margin: 0 0 24px; }
    .btn {
      background: #FF3B30;
      color: #fff;
      padding: 14px 28px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      display: inline-block;
    }
    .btn-secondary {
      background: transparent;
      color: #007AFF;
      margin-top: 12px;
    }
    .error-code {
      font-family: monospace;
      background: #eee;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="icon">😕</div>
  <h1>Payment Failed</h1>
  <p>We couldn't process your payment. Please check your card details and try again.</p>
  <a class="btn" href="speako://payment/error">Back to Speako</a>
  <a class="btn btn-secondary" id="storeLink" href="#" style="display:none;">Get the App</a>

  <script>
    (function() {
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      var isAndroid = /Android/.test(navigator.userAgent);
      var storeUrl = isIOS
        ? 'https://apps.apple.com/app/speako'
        : isAndroid
          ? 'https://play.google.com/store/apps/details?id=com.speako.app'
          : null;

      var storeLink = document.getElementById('storeLink');
      if (storeUrl) {
        storeLink.href = storeUrl;
        storeLink.style.display = 'inline-block';
      }

      setTimeout(function() {
        window.location.href = 'speako://payment/error';
      }, 300);
    })();
  </script>
</body>
</html>
